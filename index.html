<!DOCTYPE html>
<html>

<head>
    <title>Sebastian:) setlist</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1 id="titulo"> Sebastian:) Setlist</h1>

    <p>Aqui guardo las canciones que se tocar, para que no se me olviden</p>

    <input
        id="nombreCancion"
        type="text"
        placeholder="Nombre de la Cancion">
    <input
        id="artistaCancion"
        type="text"
        placeholder="Artista">
    <input
        id="capoCancion"
        type="number"
        placeholder="Capotraste">
    <input
        id="acordesCancion"
        type="text"
        placeholder="Acordes">
    <input
        id="rasgueoCancion" 
        type="text"
        placeholder="Rasgueo">

    <button id="botonAgregar">
        Agregar
    </button>

    <div id="cajaCanciones">
        <h2>Canciones</h2>
    </div>

    <script src="script.js"></script>
</body>

</html>
